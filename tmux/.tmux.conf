# Terminal multiplexer
# https://github.com/tmux/tmux

# ================ GENERAL SETTINGS ================
set-option -g focus-events on
set-option -g display-time 3000

# Key bindings
bind J resize-pane -D 20
bind K resize-pane -U 20
bind L resize-pane -L 20
bind H resize-pane -R 20
bind-key -n C-k  select-pane -U
bind-key -n C-j  select-pane -D
bind-key -n C-l  select-pane -L
bind-key -n C-h  select-pane -R
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ================ COLOR SETTINGS ================
set -g default-terminal "tmux-256color"
set-option -a terminal-features 'xterm-256color:RGB'

set-option -g automatic-rename on
set-option -g automatic-rename-format '#{pane_current_command}'

set -g base-index 1          # start indexing windows at 1 instead of 0
set -g detach-on-destroy off # don't exit from tmux when closing a session
set -g escape-time 0         # zero-out escape time delay
set -g history-limit 1000000 # increase history size (from 2,000)
set -g mouse on              # enable mouse support
set -g renumber-windows on   # renumber all windows when any window is closed
set -g set-clipboard on      # use system clipboard
set -g status-interval 2     # update the status bar every 2 seconds

set -g status-left ""
set -g status-left-length 200
set -g status-right-length 200
set -g status-position bottom
set -g status-style 'bg=default' # transparent

# ================ KANSO ZEN COLOR PALETTE ================
# Based on Kanso Zen theme - deep & rich colors for focused coding
# Inspired by Kanagawa theme with darker backgrounds and muted accents

# Background colors (sumiInk variants)
zen_bg="#16161D"           # Deep background (sumiInk3)
zen_bg_dark="#1F1F28"      # Darker variant (sumiInk4)
zen_bg_darker="#0D0C0C"    # Darkest (sumiInk0)

# Foreground colors
zen_fg="#DCD7BA"           # Main foreground (fujiWhite)
zen_fg_dim="#C8C093"       # Dimmed foreground (oldWhite)

# Accent colors (muted and elegant)
zen_blue="#7FB4CA"         # Soft blue (crystalBlue)
zen_purple="#957FB8"       # Muted purple (oniViolet)
zen_red="#E46876"          # Soft red (samuraiRed) - used for high values
zen_orange="#E6C384"       # Warm orange/yellow (carpYellow)
zen_green="#98BB6C"        # Sage green (springGreen)
zen_teal="#7AA89F"         # Muted teal (waveAqua2)

# UI colors
zen_gray="#54546D"         # Medium gray (sumiInk6)
zen_comment="#727169"      # Comment gray (fujiGray)

# ================ STATUS BAR WITH DYNAMIC COLORS ================
# CPU and Memory usage with color transitions
# Low (<60%): blue, Medium (60-80%): orange, High (>80%): red

set -g status-right "#[fg=$zen_blue] #{cpu_percentage} #[fg=$zen_comment]| #[fg=$zen_purple]ůįćõ #{ram_percentage} #[fg=$zen_comment]| #[fg=$zen_teal]ůį•Ē %H:%M #[fg=$zen_comment]| #[fg=$zen_green]ůįüÄ #H"

# Window status
set -g window-status-current-format "#[fg=$zen_purple,bold]#W"
set -g window-status-format "#[fg=$zen_comment]#W"

# Message and mode styles
set -g message-command-style "bg=default,fg=$zen_orange"
set -g message-style "bg=default,fg=$zen_orange"
set -g mode-style "bg=default,fg=$zen_orange"

# Pane borders
set -g pane-active-border-style "fg=$zen_blue,bg=default"
set -g pane-border-style "fg=$zen_gray,bg=default"

set -g allow-passthrough on

# ================ PLUGINS ================
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'rickstaa/tmux-notify'
set -g @plugin 'omerxx/tmux-sessionx'

# tmux-mem-cpu-load plugin configuration
# This plugin provides #{cpu_percentage} and #{ram_percentage}
set -g @plugin 'tmux-plugins/tmux-cpu'

# Configure tmux-cpu plugin
set -g @cpu_percentage_format "%3.0f%%"
set -g @ram_percentage_format "%3.0f%%"

# Plugin manager (must be at end)
set -g @plugin 'tmux-plugins/tpm'
run "$HOME/.tmux/plugins/tpm/tpm"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"
